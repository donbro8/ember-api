name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Build and push
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/ember/ember-api:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/ember/ember-api:${{ github.sha }}
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ember-api \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/ember/ember-api:${{ github.sha }} \
            --region us-central1 \
            --platform managed
