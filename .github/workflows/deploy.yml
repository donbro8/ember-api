name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev

      - name: Build and push
        run: |
          REGISTRY="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ember-bio-docker"
          EXTRA_INDEX="https://us-central1-python.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ember-bio-python/simple/"
          docker build \
            --build-arg PIP_EXTRA_INDEX_URL="$EXTRA_INDEX" \
            -t "$REGISTRY/api:${{ github.sha }}" \
            .
          docker push "$REGISTRY/api:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ember-api-dev \
            --image ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/ember-bio-docker/api:${{ github.sha }} \
            --region ${{ vars.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars="ENV=dev,GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}"
